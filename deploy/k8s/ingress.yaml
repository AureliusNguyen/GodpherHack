apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: godpherhack-hub
  namespace: godpherhack
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket upgrade is required for /ws/collab.
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hub.example.com
      secretName: godpherhack-hub-tls
  rules:
    - host: hub.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: godpherhack-hub
                port:
                  name: http
